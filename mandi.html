<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المندي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <header>
        <h2>مطعم الأصالة للوجبات التقليدية</h2>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="about.html">من نحن</a>
            <a href="contact.html">اتصل بنا</a>
        </nav>
    </header>

    <div class="white-box">
        <h1>المندي الأصلي</h1>
        <img src="MANDY.jpg"product-img" alt="مندي">
        <p>مندي مطبوخ على الحطب ليعطيك النكهة المدخنة الأصيلة مع الأرز النثري الرائع.</p>
        
        <hr style="margin: 20px 0;">

 <h3>اختر نوع الطلب:</h3>
        <select id="service" onchange="checkMeatType()" style="padding: 10px; width: 100%;">
            <option value="chicken">مع دجاج</option>
            <option value="meat">مع لحمة</option>
        </select>

        <div id="meat-options" style="display: none; margin-top: 15px;">
            <label>حدد نوع اللحمة:</label>
            <select style="padding: 10px; width: 100%;">
                <option>بلدي</option>
                <option>روماني</option>
            </select>
        </div>
        <h3>هل تود إضافة مشروب إلى طلبك؟</h3>
    <select id="drink-choice" onchange="checkDrinkType()"style="padding: 10px; width: 100%;">
        <option value="no">لا، شكراً</option>
        <option value="yes">نعم، أريد مشروب</option>
    </select>
    <div id="drink-list" style="display: none; margin-top: 15px;">
        <label>اختر المشروبات التي تفضلها:</label>
        <br>
        <label><input type="checkbox" name="drink" value="cola"> كولا</label>
        <br>
        <label><input type="checkbox" name="drink" value="juice">  عصير طبيعي</label>
        <br>
        <label><input type="checkbox" name="drink" value="tea"> شاي</label>
        <br>
        <label><input type="checkbox" name="drink" value="tea">قهوة</label>
        <br>
        <label><input type="checkbox" name="drink" value="tea"> زهورات</label>
        <br>
        <label><input type="checkbox" name="drink" value="tea"> ماء </label>

        
    </div>
    </div>

    <script src="script.js"></script>
    <footer><p>جميع الحقوق محفوظة 2026</p></footer>
</body>
</html>
